name: Ping Cron

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping UptimeGuard Cron
        run: |
          curl -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" https://uptime-guard-gamma.vercel.app/api/cron
