name: Ping UptimeGuard cron

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes (GitHub's minimum is every 5 min)
  workflow_dispatch: {}       # lets you trigger it manually to test

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Call cron endpoint
        run: |
          curl -sf -X GET "https://uptime-guard-gamma.vercel.app/api/cron" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
